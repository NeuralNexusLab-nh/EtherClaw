<!DOCTYPE html>
<html>
<head>
  <title>EtherClaw Console</title>
  <script src="https://js.puter.com/v2/"></script>

  <style>
body {
  background: radial-gradient(circle at top, #0a0a0f, #050505);
  color: #e0fff7;
  font-family: monospace;
  padding: 20px;
}

h1 {
  color: #00ffcc;
  text-shadow: 0 0 10px #00ffcc, 0 0 20px #0088ff;
}

input, button {
  background: rgba(0,0,0,0.6);
  color: #00ffcc;
  border: 1px solid #00ffcc;
  padding: 10px;
  margin: 5px;
  backdrop-filter: blur(6px);
  transition: 0.3s;
}

button:hover {
  background: #00ffcc;
  color: black;
  box-shadow: 0 0 10px #00ffcc, 0 0 20px #0088ff;
}

#console {
  margin-top: 20px;
  border: 1px solid #00ffcc;
  height: 240px;
  overflow-y: auto;
  padding: 10px;
  background: rgba(0, 255, 204, 0.05);
  box-shadow: inset 0 0 10px rgba(0,255,204,0.2);
}

#rsl {
  margin-top: 20px;
  white-space: pre-wrap;
  border-left: 3px solid #00ffcc;
  padding-left: 10px;
  color: #ffffff;
}

.log-info { color: #00ffcc; }
.log-exec { color: #00aaff; }
.log-error { color: #ff4d6d; }
</style>
</head>

<body>

<div class="scanline"></div>

<h1>EtherClaw Console</h1>
<h3>Create mission. AI will execute it.</h3>

<button onclick="location.href='/'">Home</button>
<button onclick="puter.auth.signOut()">Sign out</button>

<br><br>

<input id="md" placeholder="Enter mission..." style="width:300px;">
<button onclick="create()">Execute</button>

<hr>

<p>>_ Console</p>
<div id="console"></div>

<hr>

<p>Result</p>
<div id="rsl"></div>

<script>
puter.auth.signIn();

const logBox = document.getElementById("console");

function log(msg, type="info") {
  const line = document.createElement("div");
  line.className = "log-" + type;
  line.textContent = "> " + msg;

  logBox.appendChild(line);
  logBox.scrollTop = logBox.scrollHeight;
}

// hijack console
const originalLog = console.log;
console.log = (...args) => {
  log(args.join(" "));
  originalLog(...args);
};

function generateID() {
  return Math.random().toString(36).substring(2, 10);
}

function executeCode(code) {
  try {
    if (/^[A-Za-z0-9+/=]+$/.test(code)) {
      code = atob(code);
    }

    log("[EXEC] " + code, "exec");

    const safeWindow = {
      open: window.open,
      location: {
        set href(url) {
          log("[NAVIGATE] " + url, "info");
          window.open(url, "_blank");
        }
      }
    };

    const fn = new Function("window", "console", `
      "use strict";
      ${code}
    `);
    fn(safeWindow, console);
    return "Code Executed Successful.";

  } catch (e) {
    log("[ERROR] " + e.message, "error");
    return e.message;
  }
}

// tools
const tools = [
  {
    type: "function",
    function: {
      name: "execute",
      description: "Execute JavaScript code in browser",
      parameters: {
        type: "object",
        properties: {
          jscode: { type: "string" }
        },
        required: ["jscode"]
      }
    }
  },
  {
    type: "web_search"
  }
];

let running = false;
let loadingInterval;

function startLoading() {
  let dots = 0;
  loadingInterval = setInterval(() => {
    dots = (dots + 1) % 4;
    document.getElementById("rsl").innerText =
      "Running mission" + ".".repeat(dots) + " DO NOT CLOSE TAB";
  }, 500);
}

function stopLoading() {
  clearInterval(loadingInterval);
}

async function create() {
  if (running) return;
  running = true;

  const mission = document.getElementById("md").value;
  const id = generateID();
  location.hash = id;

  log("Mission ID: " + id);

  startLoading();

  try {
    const res = await puter.ai.chat(
  [
    {
      role: "system",
      content: `
You are EtherClaw, an AI that MUST use tools to complete tasks.

Rules:
- If a task involves actions, you MUST call the "execute" function
- Do NOT just explain
- Always prefer execution over explanation
      `
    },
    { role: "user", content: mission }
  ],
  {
    model: "claude-sonnet-4-6",
    tools,
    tool_choice: "auto"
  }
);

    const msg = res.message;
    let resultText = "";

    if (msg.tool_calls) {
      let toolResults = [];

      for (const call of msg.tool_calls) {
        const args = JSON.parse(call.function.arguments);

        let result = "";

        if (call.function.name === "execute") {
          result = executeCode(args.jscode);
        }

        toolResults.push({
          role: "tool",
          tool_call_id: call.id,
          content: String(result)
        });
      }

      const final = await puter.ai.chat([
        {
          role: "system",
          content: "You are an AI named 'EtherClaw', you're based on GPT-5.4. Explain clearly what you executed."
        },
        { role: "user", content: mission },
        msg,
        ...toolResults
      ]);

      resultText = final.message.content;

    } else {
      resultText = msg.content;
    }

    stopLoading();
    document.getElementById("rsl").innerText = resultText;


  } catch (e) {
    stopLoading();
    log(e.message, "error");
  }

  running = false;
}
</script>

</body>
</html>
