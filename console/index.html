<!DOCTYPE html>
<html>
<head>
  <title>EtherClaw Console</title>
  <script src="https://js.puter.com/v2/"></script>
  <style>
    /* ... 保持你的 CSS 不變 ... */
    body { background: radial-gradient(circle at top, #0a0a0f, #050505); color: #e0fff7; font-family: monospace; padding: 20px; }
    h1 { color: #00ffcc; text-shadow: 0 0 10px #00ffcc, 0 0 20px #0088ff; }
    input, button { background: rgba(0,0,0,0.6); color: #00ffcc; border: 1px solid #00ffcc; padding: 10px; margin: 5px; backdrop-filter: blur(6px); transition: 0.3s; cursor: pointer;}
    button:hover { background: #00ffcc; color: black; box-shadow: 0 0 10px #00ffcc, 0 0 20px #0088ff; }
    #console { margin-top: 20px; border: 1px solid #00ffcc; height: 240px; overflow-y: auto; padding: 10px; background: rgba(0, 255, 204, 0.05); }
    #rsl { margin-top: 20px; white-space: pre-wrap; border-left: 3px solid #00ffcc; padding-left: 10px; color: #ffffff; }
    .log-info { color: #00ffcc; }
    .log-exec { color: #00aaff; }
    .log-error { color: #ff4d6d; }
  </style>
</head>
<body>

<h1>EtherClaw Console</h1>
<h3>Create mission. AI will execute it.</h3>

<button onclick="ensureAuth()">Login / Check Status</button>
<button onclick="puter.auth.signOut(); location.reload();">Sign out</button>

<br><br>

<input id="md" placeholder="Enter mission (e.g. Open Google and search for Bitcoin)..." style="width:300px;">
<button id="execBtn" onclick="create()">Execute</button>

<hr>
<p>>_ Console</p>
<div id="console"></div>
<hr>
<p>Result</p>
<div id="rsl"></div>

<script>
// 1. 修正身份驗證：不要在 Load 時直接彈窗
async function ensureAuth() {
    if (!puter.auth.isSignedIn()) {
        await puter.auth.signIn();
    } else {
        log("Already signed in as: " + (await puter.auth.getUser()).username);
    }
}

const logBox = document.getElementById("console");
function log(msg, type="info") {
  const line = document.createElement("div");
  line.className = "log-" + type;
  line.textContent = "> " + msg;
  logBox.appendChild(line);
  logBox.scrollTop = logBox.scrollHeight;
}

// 2. 修正代碼執行邏輯
function executeCode(code) {
  try {
    // 改進 Base64 判斷邏輯，通常 AI 傳回的是純 JS，除非你明確要求 Base64
    // 這裡暫時移除自動 atob 以免誤判，若要支持，建議由 AI 在 prompt 中明確標註
    
    log("[EXEC] Executing script...", "exec");

    const safeWindow = {
      open: (url) => window.open(url, "_blank"),
      location: {
        set href(url) { window.open(url, "_blank"); }
      }
    };

    const fn = new Function("window", "console", `"use strict"; ${code}`);
    fn(safeWindow, console);
    return "Execution completed in new context.";
  } catch (e) {
    log("[ERROR] " + e.message, "error");
    return "Error: " + e.message;
  }
}

const tools = [
  {
    type: "function",
    function: {
      name: "execute",
      description: "Execute JavaScript code in browser to interact with pages or logic",
      parameters: {
        type: "object",
        properties: { jscode: { type: "string" } },
        required: ["jscode"]
      }
    }
  }
  // 注意：web_search 在 puter.ai.chat 中通常是內建工具，
  // 如果要用，確保後端支援。這裡我們先專注於 execute。
];

let running = false;

async function create() {
  if (running) return;
  if (!puter.auth.isSignedIn()) {
    alert("Please login first!");
    return;
  }

  const mission = document.getElementById("md").value;
  if(!mission) return;

  running = true;
  document.getElementById("rsl").innerText = "Thinking...";
  log("Mission Started: " + mission);

  try {
    // 3. 使用正確的模型名稱 (gpt-4o 或 gpt-3.5-turbo)
    const res = await puter.ai.chat(
      [
        {
          role: "system",
          content: "You are EtherClaw. You complete tasks by writing JavaScript. Use the 'execute' tool for any actions."
        },
        { role: "user", content: mission }
      ],
      {
        model: "gpt-5.4", 
        tools: tools,
        tool_choice: "auto"
      }
    );

    let message = res.message;

    // 4. 處理工具調用循環
    if (message.tool_calls) {
      log("AI requested tool execution...");
      const toolResults = [];

      for (const call of message.tool_calls) {
        if (call.function.name === "execute") {
          const args = JSON.parse(call.function.arguments);
          const execRes = executeCode(args.jscode);
          
          toolResults.push({
            role: "tool",
            tool_call_id: call.id,
            content: execRes
          });
        }
      }

      // 將執行結果餵回給 AI 做最終總結
      const finalRes = await puter.ai.chat([
        { role: "user", content: mission },
        message,
        ...toolResults
      ], { model: "gpt-5.4" });

      document.getElementById("rsl").innerText = finalRes.message.content;
    } else {
      document.getElementById("rsl").innerText = message.content;
    }

  } catch (e) {
    log(e.message, "error");
    document.getElementById("rsl").innerText = "Error occurred. Check console.";
  } finally {
    running = false;
  }
}
</script>
</body>
</html>
